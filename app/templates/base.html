<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Реестр объектов{% endblock %}</title>
  <meta name="theme-color" content="#1f2937">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Реестр объектов">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/icons/app-icon.svg') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', path='/icons/app-icon.svg') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', path='/css/styles.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="/">Реестр объектов</a>
      <div class="navbar-nav">
        <a class="nav-link" href="/">Сводка</a>
        <a class="nav-link" href="/import/">Импорт</a>
        <a class="nav-link" href="/real-estate/">Недвижимость</a>
        <a class="nav-link" href="/waste-objects/">Объекты отходов</a>
        <a class="nav-link" href="/legal-entities/">Юрлица</a>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    {% block content %}{% endblock %}
  </main>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch((error) => {
          console.error("Service Worker registration failed:", error);
        });
      });
    }
  </script>
</body>
</html>
